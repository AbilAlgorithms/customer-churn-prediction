data:
  raw_path: "data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv"
  processed_path: "data/processed/telco_cleaned.csv"
  target: "Churn"

model:
  test_size: 0.2
  random_state: 42
  save_path: "models/xgb_pipeline.pkl"
  xgb_params:
    max_depth: 4
    learning_rate: 0.05
    n_estimators: 150
    scale_pos_weight: 2.8